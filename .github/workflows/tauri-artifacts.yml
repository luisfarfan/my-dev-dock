name: Tauri build and release assets

on:
  # Invoked by Semantic release workflow (gh workflow run) so installers always build after a bump.
  # Manual recovery: Actions → Run workflow.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    env:
      APP_NAME: myDevDock

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing APPLE_CERTIFICATE or APPLE_CERTIFICATE_PASSWORD secret."
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/apple_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (required for Gatekeeper trust).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          projectPath: src-tauri
          tauriScript: bun run tauri
          includeUpdaterJson: false
          tagName: ${{ inputs.tag }}
          releaseName: 'myDevDock ${{ inputs.tag }}'
          releaseBody: 'Desktop installers built by GitHub Actions. See the [changelog](https://github.com/luisfarfan/my-dev-dock/blob/master/CHANGELOG.md) for details.'
          releaseDraft: false
          prerelease: false

      - name: Verify signatures in release assets (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/release-assets"
          mkdir -p "$OUT_DIR"
          gh release download "${{ inputs.tag }}" --pattern "*.dmg" --dir "$OUT_DIR"
          for dmg in "$OUT_DIR"/*.dmg; do
            [ -f "$dmg" ] || continue
            MOUNT_POINT="$RUNNER_TEMP/mount-$(basename "$dmg" .dmg)"
            mkdir -p "$MOUNT_POINT"
            hdiutil attach "$dmg" -nobrowse -mountpoint "$MOUNT_POINT"
            APP_PATH=$(ls -d "$MOUNT_POINT"/*.app | head -n 1)
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            spctl -a -vvv -t exec "$APP_PATH"
            hdiutil detach "$MOUNT_POINT"
          done
