name: Tauri build and release assets

on:
  push:
    tags:
      - 'v*'
  # Run once from Actions tab if installers are missing (e.g. before GH_TOKEN was set).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tauriScript: bun run tauri
          includeUpdaterJson: false
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 'myDevDock ${{ github.ref_name }}'
          releaseBody: 'Desktop installers built by GitHub Actions. See the [changelog](https://github.com/luisfarfan/my-dev-dock/blob/master/CHANGELOG.md) for details.'
          releaseDraft: false
          prerelease: false
