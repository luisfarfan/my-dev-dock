name: Semantic release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write # gh workflow run → Tauri installers workflow

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Prefer GH_TOKEN (PAT: contents:write + actions:read/write for gh workflow dispatch).
      # Plain GITHUB_TOKEN cannot trigger other workflows via tag push; we dispatch Tauri explicitly below.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_TOKEN || github.token }}

      # semantic-release v25+ requires Node ^22.14.0 || >= 24.10.0 (runner default is Node 20).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Record package version before release
        id: before_version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: bunx semantic-release

      - name: Dispatch Tauri installer build
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          AFTER=$(node -p "require('./package.json').version")
          BEFORE="${{ steps.before_version.outputs.version }}"
          if [ "$AFTER" = "$BEFORE" ]; then
            echo "No version bump (nothing released); skipping Tauri workflow."
            exit 0
          fi
          TAG="v${AFTER}"
          echo "Dispatching Tauri build for tag $TAG"
          gh workflow run tauri-artifacts.yml --ref master -f tag="$TAG"
