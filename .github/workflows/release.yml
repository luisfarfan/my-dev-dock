name: Semantic release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Prefer repo secret GH_TOKEN (fine-grained or classic PAT, contents:write) so tag pushes
      # trigger Tauri "on: push: tags". Default GITHUB_TOKEN pushes do not start other workflows.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_TOKEN || github.token }}

      # semantic-release v25+ requires Node ^22.14.0 || >= 24.10.0 (runner default is Node 20).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: bunx semantic-release
